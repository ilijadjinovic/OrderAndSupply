<!doctype html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lokacije firme</title>
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<div class="app-shell">
  <div id="app-nav"></div>
  <main class="content">
    <div class="page-header">
      <div><div class="eyebrow">Admin firme</div><h1 data-i18n="locations">Lokacije</h1></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Dodaj lokaciju</h2></div>
      <form id="loc-form" class="form-row" style="align-items:end;">
        <div class="field"><label>Naziv (npr. Magacin Novi Beograd)</label><input type="text" id="loc-name" required /></div>
        <div class="field"><label>Adresa</label><input type="text" id="loc-address" /></div>
        <button type="submit" class="btn btn-amber" style="height:42px;">+ Dodaj</button>
      </form>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Naziv</th><th>Adresa</th><th></th></tr></thead>
          <tbody id="loc-body"><tr class="empty-row"><td colspan="3">Učitavanje...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script type="module" src="./js/page-admin-locations.js"></script>
</body>
</html>
