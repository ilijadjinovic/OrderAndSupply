<!doctype html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nova narudžbina</title>
<link rel="stylesheet" href="./css/base.css" />
<link rel="stylesheet" href="./css/components.css" />
</head>
<body>
<div class="app-shell">
  <div id="app-nav"></div>
  <main class="content">
    <div class="page-header">
      <div><div class="eyebrow">Naručilac</div><h1 data-i18n="new_order">Nova narudžbina</h1></div>
      <div style="display:flex;gap:8px;">
        <select id="template-select" style="max-width:240px;"><option value="">Učitaj iz šablona / liste...</option></select>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>1. Izaberi dobavljača i dodaj artikle</h2></div>
      <div class="form-row">
        <div class="field">
          <label data-i18n="supplier">Dobavljač</label>
          <select id="supplier-select"><option value="">— izaberi dobavljača —</option></select>
        </div>
        <div class="field">
          <label data-i18n="location">Lokacija preuzimanja</label>
          <select id="pickup-select"><option value="any" data-i18n="any_location">Bilo koja lokacija</option></select>
        </div>
      </div>
      <div id="product-list" class="card-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>2. Lista artikala</h2></div>
      <div id="cart-host"><p class="muted">Još niste dodali artikle.</p></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>3. Mesto isporuke</h2></div>
      <p class="hint">Označite lokacije isporuke. Ako dodate više lokacija, za svaki artikal izaberite gde ide (u listi artikala iznad).</p>
      <div id="delivery-locations" class="form-row"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>4. Prioritet</h2></div>
      <div style="display:flex;gap:18px;">
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;"><input type="radio" name="priority" value="standardno" checked style="width:auto;" /> Standardno</label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;"><input type="radio" name="priority" value="hitno" style="width:auto;" /> Hitno</label>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>5. Sačuvaj kao (opciono)</h2></div>
      <div class="form-row">
        <div class="field"><label>Sačuvaj ovu listu kao</label>
          <select id="save-as-type">
            <option value="">Ne čuvaj</option>
            <option value="sablon">Šablon</option>
            <option value="omiljena_lista">Omiljena lista</option>
            <option value="ponavljajuca">Ponavljajuća narudžbina</option>
          </select>
        </div>
        <div class="field"><label>Naziv liste / šablona</label><input type="text" id="save-as-name" placeholder="npr. Kancelarija" /></div>
      </div>
      <div id="recurring-days" class="hidden">
        <label>Dani ponavljanja</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="pon" class="recur-day" style="width:auto;" /> Pon</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="uto" class="recur-day" style="width:auto;" /> Uto</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="sre" class="recur-day" style="width:auto;" /> Sre</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="cet" class="recur-day" style="width:auto;" /> Čet</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="pet" class="recur-day" style="width:auto;" /> Pet</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="sub" class="recur-day" style="width:auto;" /> Sub</label>
          <label style="display:flex;align-items:center;gap:5px;font-weight:500;"><input type="checkbox" value="ned" class="recur-day" style="width:auto;" /> Ned</label>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="submit-order" style="font-size:16px;padding:14px 26px;">Pošalji narudžbinu</button>
  </main>
</div>
<script type="module" src="./js/page-new-order.js"></script>
</body>
</html>
