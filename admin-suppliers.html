<!doctype html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dobavljači</title>
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<div class="app-shell">
  <div id="app-nav"></div>
  <main class="content">
    <div class="page-header">
      <div><div class="eyebrow">Admin firme</div><h1 data-i18n="suppliers">Dobavljači</h1></div>
      <button class="btn btn-amber" id="new-supplier-btn">+ Novi dobavljač</button>
    </div>

    <div class="card-grid" id="suppliers-grid">
      <p class="muted">Učitavanje...</p>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="supplier-modal">
  <div class="modal-card">
    <div class="modal-head"><h2>Novi dobavljač</h2><button class="icon-btn" id="close-supplier-modal">✕</button></div>
    <form id="supplier-form">
      <div class="field"><label>Naziv dobavljača</label><input type="text" id="s-name" required /></div>
      <div class="field"><label>Kontakt osoba</label><input type="text" id="s-contact" /></div>
      <div class="form-row">
        <div class="field"><label>Telefon</label><input type="tel" id="s-phone" /></div>
        <div class="field"><label>Email</label><input type="email" id="s-email" /></div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sačuvaj</button>
    </form>
  </div>
</div>

<div class="modal-overlay hidden" id="location-modal">
  <div class="modal-card">
    <div class="modal-head"><h2>Lokacije preuzimanja</h2><button class="icon-btn" id="close-location-modal">✕</button></div>
    <div id="location-list" style="margin-bottom:14px;"></div>
    <form id="location-form" class="form-row" style="align-items:end;">
      <div class="field"><label>Naziv lokacije</label><input type="text" id="l-name" required /></div>
      <div class="field"><label>Adresa</label><input type="text" id="l-address" /></div>
      <button type="submit" class="btn btn-amber" style="height:42px;">+ Dodaj</button>
    </form>
  </div>
</div>

<script type="module" src="./js/page-admin-suppliers.js"></script>
</body>
</html>
